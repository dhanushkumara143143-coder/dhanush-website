<!DOCTYPE html>
<html>
<head>
  <title>Dhanush Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
      text-align: center;
    }

    .navbar {
      background-color: #111;
      color: white;
      padding: 15px;
      font-size: 20px;
    }

    .content {
      padding: 30px;
    }

    h1 {
      color: #333;
    }

    input, textarea {
      width: 90%;
      max-width: 300px;
      padding: 10px;
      margin-top: 10px;
    }

    button {
      padding: 10px 20px;
      margin-top: 10px;
      background-color: blue;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: darkblue;
    }

    #msg {
      color: green;
      font-weight: bold;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <div class="navbar">
    Dhanush Website 🚀
  </div>

  <div class="content">
    <h1>Welcome 👋</h1>
    <p>I am learning Web Development.</p>

    <h2>Contact Me</h2>

    <form onsubmit="showThankYou(event)">
      <input type="text" placeholder="Enter your name" required><br>
      <input type="email" placeholder="Enter your email" required><br>
      <textarea placeholder="Your message" rows="4" required></textarea><br>
      <button type="submit">Send</button>
    </form>

    <p id="msg"></p>
  </div>

  <script>
    function showThankYou(event) {
      event.preventDefault();
      document.getElementById("msg").innerText =
        "Thank you! Your message sent successfully ✅";
    }
  </script>

</body>
</html>
