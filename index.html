<!DOCTYPE html>
<html>
<head>
<title>Dhanush Portfolio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#667eea,#764ba2);
text-align:center;
color:white;
}

.navbar{
background:black;
padding:15px;
font-size:24px;
font-weight:bold;
}

.content{
padding:30px;
}

.profile{
width:150px;
height:150px;
border-radius:50%;
border:5px solid white;
margin-top:20px;
}

h1{
font-size:32px;
margin-top:15px;
}

p{
font-size:18px;
}

.box{
background:white;
color:black;
padding:20px;
border-radius:10px;
display:inline-block;
margin-top:20px;
}

input,textarea{
width:90%;
max-width:300px;
padding:10px;
margin-top:10px;
border-radius:5px;
border:1px solid gray;
}

button{
padding:10px 20px;
margin-top:10px;
background:#4CAF50;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#2e7d32;
}

#msg{
color:green;
font-weight:bold;
margin-top:10px;
}

</style>
</head>

<body>

<div class="navbar">
Dhanush Website 🚀
</div>

<div class="content">

<img class="profile" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">

<h1>Welcome 👋</h1>

<p>I am Dhanush.<br>
I am learning Web Development and Programming.</p>

<div class="box">

<h2>Contact Me</h2>

<form onsubmit="showThankYou(event)">

<input type="text" placeholder="Enter your name" required><br>

<input type="email" placeholder="Enter your email" required><br>

<textarea placeholder="Your message" rows="4" required></textarea><br>

<button type="submit">Send</button>

</form>

<p id="msg"></p>

</div>

</div>

<script>

function showThankYou(event){
event.preventDefault();
document.getElementById("msg").innerText=
"Thank you! Your message sent successfully ✅";
}

</script>

</body>
</html>
